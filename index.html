<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 28px 24px;
      color: #fff;
    }

    .header h1 { font-size: 22px; font-weight: 700; }

    .header .stats {
      font-size: 13px;
      opacity: 0.85;
      margin-top: 6px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      padding: 20px 24px;
      border-bottom: 1px solid #f0f0f0;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #667eea; }

    .input-row button {
      padding: 10px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .input-row button:hover { background: #5a6fd6; }
    .input-row button:active { transform: scale(0.95); }

    .list { padding: 8px 0; min-height: 60px; }

    .empty {
      text-align: center;
      color: #bbb;
      font-size: 14px;
      padding: 40px 0;
    }

    .loading {
      text-align: center;
      color: #999;
      font-size: 14px;
      padding: 40px 0;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid #f8f8f8;
      transition: background 0.15s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item:hover { background: #fafafa; }
    .item:last-child { border-bottom: none; }

    .item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 15px;
      color: #333;
      transition: all 0.2s;
      word-break: break-all;
    }

    .item.done .item-text {
      text-decoration: line-through;
      color: #bbb;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: #e74c3c; background: #ffeaea; }

    .footer {
      padding: 14px 24px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer span { font-size: 13px; color: #aaa; }

    .clear-btn {
      background: none;
      border: none;
      color: #e74c3c;
      font-size: 13px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .clear-btn:hover { background: #ffeaea; }

    .db-badge {
      font-size: 11px;
      background: rgba(255,255,255,0.2);
      border-radius: 6px;
      padding: 2px 8px;
      margin-top: 4px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>🛒 쇼핑 리스트</h1>
      <div class="stats" id="stats">불러오는 중...</div>
      <span class="db-badge">☁️ Supabase 연동</span>
    </div>

    <div class="input-row">
      <input type="text" id="input" placeholder="추가할 항목 입력..." maxlength="100">
      <button onclick="addItem()" title="추가">＋</button>
    </div>

    <div class="list" id="list">
      <div class="loading">불러오는 중...</div>
    </div>

    <div class="footer">
      <span id="done-count"></span>
      <button class="clear-btn" onclick="clearDone()">완료 항목 삭제</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://mcfpyikuzjkxbxradzgo.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jZnB5aWt1empreGJ4cmFkemdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMTg5MjIsImV4cCI6MjA5NzU5NDkyMn0.A6tDil970lYOrH_oFLK8UauF4Ih_4b515SWeLYMbhmU';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let items = [];

    const inputEl = document.getElementById('input');
    inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

    async function load() {
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });

      if (error) { console.error(error); return; }
      items = data;
      render();
    }

    async function addItem() {
      const text = inputEl.value.trim();
      if (!text) return;

      const { data, error } = await db
        .from('shopping_items')
        .insert({ text, done: false })
        .select()
        .single();

      if (error) { console.error(error); return; }
      items.push(data);
      inputEl.value = '';
      render();
      inputEl.focus();
    }

    async function toggle(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;

      const { error } = await db
        .from('shopping_items')
        .update({ done: !item.done })
        .eq('id', id);

      if (error) { console.error(error); return; }
      item.done = !item.done;
      render();
    }

    async function remove(id) {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) { console.error(error); return; }
      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearDone() {
      const doneIds = items.filter(i => i.done).map(i => i.id);
      if (!doneIds.length) return;

      const { error } = await db
        .from('shopping_items')
        .delete()
        .in('id', doneIds);

      if (error) { console.error(error); return; }
      items = items.filter(i => !i.done);
      render();
    }

    function render() {
      const listEl = document.getElementById('list');
      const statsEl = document.getElementById('stats');
      const doneCountEl = document.getElementById('done-count');

      const total = items.length;
      const done = items.filter(i => i.done).length;

      statsEl.textContent = total === 0 ? '항목 없음' : `전체 ${total}개`;
      doneCountEl.textContent = total > 0 ? `${done} / ${total} 완료` : '';

      if (total === 0) {
        listEl.innerHTML = '<div class="empty">항목을 추가해보세요</div>';
        return;
      }

      listEl.innerHTML = items.map(item => `
        <div class="item ${item.done ? 'done' : ''}">
          <input type="checkbox" ${item.done ? 'checked' : ''}
                 onchange="toggle(${item.id})">
          <span class="item-text">${escapeHtml(item.text)}</span>
          <button class="delete-btn" onclick="remove(${item.id})" title="삭제">✕</button>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    load();
  </script>
</body>
</html>
